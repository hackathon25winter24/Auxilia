syntax = "proto3";

package game;

option go_package = "auxilia/pb";
option csharp_namespace = "Game.Network";

service GameService {
  // 試合状況を保存
  rpc SaveGame (SaveGameRequest) returns (SaveGameResponse);
  
  // 試合状況を削除
  rpc DeleteGame (DeleteGameRequest) returns (DeleteGameResponse);
  
  // 保存されている試合一覧を取得
  rpc ListGames (ListGamesRequest) returns (ListGamesResponse);
}

// --- メッセージ定義 ---

message SaveGameRequest {
  uint32 room_id = 1;
  string player_1p_id = 2;
  string player_2p_id = 3;
  int32 base_hp_1p = 4;
  int32 base_hp_2p = 5;
  uint32 turn = 6;
  repeated UniqueCharacter characters = 7; // リスト形式
}

message SaveGameResponse {
  bool success = 1;
}

message DeleteGameRequest {
  uint32 room_id = 1;
}

message DeleteGameResponse {
  bool success = 1;
}

message ListGamesRequest {}

message ListGamesResponse {
  repeated SaveGameRequest games = 1; // SaveGameRequestを再利用
}

// キャラクター情報
message UniqueCharacter {
  uint32 character_id = 1;
  int32 hp = 2;
  int32 x = 3;
  int32 y = 4;
  bool is_1p = 5;
  repeated CharacterCondition conditions = 6; // 状態異常リスト
}

// 状態異常情報
message CharacterCondition {
  uint32 condition_id = 1;
  uint32 lasting_turn = 2;
}