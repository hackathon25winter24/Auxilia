syntax = "proto3";

package game.network;
option csharp_namespace = "Game.Network";
option go_package = "auxilia/pb";

import "google/protobuf/timestamp.proto";

service BattleService {
  // 試合の初期登録
  rpc CreateGame(CreateGameRequest) returns (GameDataResponse);
  
  // 現在の試合情報の取得
  rpc GetGameData(GetGameDataRequest) returns (GameDataResponse);
  rpc RegisterCharacters(RegisterCharactersRequest) returns (RegisterCharactersResponse);
  
  // 対戦中のアクション同期（サーバー・ストリーミング）
  // ルームIDを指定して受信を開始する
  rpc StreamGame(StreamGameRequest) returns (stream GameDataResponse);

  // アクション送信（個別の単方向RPC）
  rpc ApplyMove(MoveAction) returns (AcceptResponse);
  rpc ApplyAttack(AttackAction) returns (AcceptResponse);
  rpc ApplyGridUpdate(GridUpdateAction) returns (AcceptResponse);
  rpc ApplyEffect(ApplyEffectRequest) returns (AcceptResponse);

  rpc EndTurn(EndTurnRequest) returns (AcceptResponse);
  rpc NewTurn(NewTurnRequest) returns (AcceptResponse);
  rpc FetchActionLog(FetchActionLogRequest) returns (GameActionLog);
}

// 試合登録用リクエスト
message CreateGameRequest {
  uint32 room_id = 1;
  string player1_id = 2;
  string player2_id = 3;
}

message StreamGameRequest {
  uint32 room_id = 1;
  string player_id = 2;
}

message GridUpdateAction {
  uint32 room_id = 1;
  string player_id = 3;
  repeated GridInfo grids = 2;
}

message MoveAction {
  uint32 room_id = 1;
  string player_id = 2;
  uint32 character_id = 3;
  uint32 to_x = 4;
  uint32 to_y = 5;
}

message AttackAction {
  uint32 room_id = 1;
  string player_id = 2;
  uint32 attacker_character_id = 3;
  int32 attack_type = 4;
  repeated AttackInfo attack_infos = 8;
}

message AttackInfo {
  uint32 attacked_character_id = 1;//base1=98,base2=99
  uint32 new_hp = 2; 
}

// 試合情報全体のレスポンス
message GameDataResponse {
  uint32 id = 1;
  uint32 room_id = 2;
  string player1_id = 3;
  string player2_id = 4;
  uint32 base_hp1 = 5;
  uint32 base_hp2 = 6;
  uint32 turn = 7;
  bool is_1p_turn = 8;
  google.protobuf.Timestamp turn_start_at = 9;
  repeated UniqueCharacter characters = 10;
  bool is_finished = 11;
  string winner_player_id = 12;
  google.protobuf.Timestamp finished_at = 13;
  repeated AttackInfo attack_infos = 14;
  repeated GridInfo grids = 15;
  uint32 cost_1p = 16;
  uint32 cost_2p = 17;
  int32 p1_rate_delta = 18;
  int32 p2_rate_delta = 19;
  int32 p1_rate = 20;
  int32 p2_rate = 21;
  GameActionLog game_action_log = 22;
  bool is_turn_ended = 23;
}

message GridInfo {
  uint32 position_x = 1;
  uint32 position_y = 2;
  int32 debuff_type = 3;
  int32 grid_type = 4;
}

message UniqueCharacter {
  uint32 id = 1;
  uint32 character_id = 2;
  bool is_1p = 3;
  uint32 hp = 4;
  uint32 position_x = 5;
  uint32 position_y = 6;
  repeated CharacterCondition conditions = 7;
  bool is_selected = 8;
}

message CharacterCondition {
  uint32 id = 1;
  int32 condition_id = 2;
  int32 lasting_turn = 3;
}

message GetGameDataRequest {
  uint32 room_id = 1;
}

message RegisterCharactersRequest {
  uint32 room_id = 1;
  bool is_1p = 2;
  repeated uint32 character_ids = 3; // 選んだ3体のマスターID
}

message RegisterCharactersResponse {
  repeated UniqueCharacter registered_characters = 1;
}

message FetchActionLogRequest {
  uint32 room_id = 1;
  uint32 sequence = 2; // 消失した通し番号を指定してピンポイントに貰う
}

message GameActionLog {
  uint32 id = 1;
  uint32 room_id = 2;
  uint32 sequence = 3;
  string player_id = 4;
  ActionType action_type = 5;
  uint32 actor_character_unique_id = 6;

  // 行動タイプによって中身が切り替わることを明示
  oneof detail {
    MoveDetail move_detail = 7;
    AttackDetail attack_detail = 8;
  }
}

enum ActionType {
  ACTION_TYPE_UNKNOWN = 0;
  MOVE = 1;
  ATTACK = 2;
}

message MoveDetail {
  uint32 to_x = 1;
  uint32 to_y = 2;
}

message AttackDetail {
  int32 attack_type = 1;
  repeated uint32 target_character_unique_ids = 2; 
}

message ApplyEffectRequest {
  uint32 room_id = 1;
  string player_id = 2;
  uint32 character_id = 3; 
  int32 effect_type = 4; 
  uint32 new_hp = 5;              
}

message NewTurnRequest{
  uint32 room_id = 1;
  string player_id = 2;
}

message AcceptResponse {
  bool success = 1;
  string message = 2; // デバッグ用エラーメッセージなど
}

message EndTurnRequest{
  uint32 room_id = 1;
  string player_id = 2;
}